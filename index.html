<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IronVault Pro • Cloud-Ready Encrypted Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- AWS SDK for S3 compatibility (Backblaze B2 S3-compatible) -->
    <script src="https://cdn.jsdelivr.net/npm/@aws-sdk/client-s3@3.525.0/dist/index.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s, color 0.2s;
        }
        :root {
            --bg-gradient: radial-gradient(circle at 10% 20%, #0a0819, #0b0a1a);
            --card-bg: rgba(20, 18, 40, 0.75);
            --border-glow: rgba(139, 92, 246, 0.4);
            --text-primary: #f0f3fa;
            --text-secondary: #a1a1c2;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --danger: #ef4444;
            --success: #10b981;
        }
        body.light {
            --bg-gradient: linear-gradient(135deg, #e0e7ff, #f3e8ff);
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-glow: rgba(139, 92, 246, 0.3);
            --text-primary: #1e1b4b;
            --text-secondary: #4c51bf;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 28px; position: relative; z-index: 2; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid var(--border-glow); transition: all 0.2s; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; padding: 16px 24px; margin-bottom: 32px; background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 48px; border: 1px solid var(--border-glow); }
        .logo h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(130deg, #fff, #c084fc, #a855f7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge { padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .locked { background: rgba(239, 68, 68, 0.2); color: #ff8a8a; border: 1px solid rgba(239, 68, 68, 0.4); }
        .unlocked { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.5); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 36px; }
        .stat-card { background: var(--card-bg); border-radius: 28px; padding: 20px 24px; border: 1px solid var(--border-glow); transition: all 0.2s; }
        .stat-value { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #fff, #c4b5fd); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .upload-area { border: 2px dashed var(--accent); border-radius: 38px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 32px; background: rgba(0,0,0,0.2); }
        .upload-area:hover { border-color: var(--accent-hover); background: rgba(139, 92, 246, 0.1); transform: scale(1.01); }
        .search-input { width: 100%; padding: 16px 24px 16px 52px; background: rgba(12, 10, 30, 0.8); border: 1px solid var(--border-glow); border-radius: 56px; color: var(--text-primary); font-size: 1rem; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-height: 560px; overflow-y: auto; padding: 4px; }
        .file-card { background: var(--card-bg); border-radius: 28px; padding: 18px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .file-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5); }
        .btn-primary { background: linear-gradient(105deg, #8b5cf6, #6d28d9); color: white; border-radius: 48px; padding: 12px 24px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-secondary { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 48px; padding: 12px 24px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); align-items: center; justify-content: center; z-index: 1100; }
        .modal.show { display: flex; }
        .modal-content { background: #15132b; border-radius: 44px; padding: 32px; max-width: 500px; width: 90%; border: 1px solid #8b5cf6; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #181633; backdrop-filter: blur(12px); padding: 14px 22px; border-radius: 48px; color: white; z-index: 1200; border-left: 4px solid; animation: slideUp 0.3s ease; }
        .theme-toggle { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-primary); }
        .cloud-badge { background: rgba(59,130,246,0.2); border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 6px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1><i class="fas fa-shield-alt"></i> IronVault Pro</h1><p>AES-256 • Cloud-Ready • Zero-Trust</p></div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <div id="statusBadge" class="status-badge locked"><i class="fas fa-lock"></i> Locked</div>
        </div>
    </div>

    <div id="loginSection"><div class="glass-card" style="max-width:500px; margin:60px auto; padding:40px; text-align:center;"><h2><i class="fas fa-dragon"></i> IronVault</h2><p>Your encrypted sanctuary</p><input type="password" id="passwordInput" class="search-input" style="margin:20px 0;" placeholder="Master password" onkeypress="if(event.key==='Enter') unlock()"><button class="btn-primary" style="width:100%;" onclick="unlock()">Unlock Vault</button><button class="btn-secondary" style="width:100%; margin-top:12px;" onclick="showCreateModal()">Create New Vault</button><hr style="margin:20px 0;"><div><i class="fas fa-cloud-upload-alt"></i> <strong>Backblaze B2 Ready</strong><br><span style="font-size:12px;">Configure cloud backup in settings</span></div></div></div>

    <div id="vaultSection" style="display:none;">
        <div class="stats-grid"><div class="stat-card"><div class="stat-label">Total Files</div><div class="stat-value" id="totalFiles">0</div></div><div class="stat-card"><div class="stat-label">Storage Used</div><div class="stat-value" id="totalSize">0 MB</div></div><div class="stat-card"><div class="stat-label">Cloud Status</div><div class="stat-value" id="cloudStatus" style="font-size:1.2rem;">⚡ Not connected</div></div></div>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()"><div class="upload-icon"><i class="fas fa-cloud-upload-alt" style="font-size:48px;"></i></div><div style="font-weight:600;">Secure Upload</div><div style="font-size:0.8rem;">AES-256 encrypted • Drag & drop</div><input type="file" id="fileInput" multiple style="display:none" onchange="handleFileUpload(this.files)"></div>
        
        <div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:20px; flex-wrap:wrap;"><div style="flex:2; position:relative;"><i class="fas fa-search" style="position:absolute; left:18px; top:50%; transform:translateY(-50%);"></i><input type="text" id="searchInput" class="search-input" placeholder="Search files..." onkeyup="filterFiles()"></div><select id="sortSelect" class="search-input" style="width:auto;" onchange="sortFiles()"><option value="date">Newest</option><option value="name">Name A-Z</option><option value="size">Size</option></select><button class="btn-secondary" onclick="showCloudSettings()"><i class="fas fa-database"></i> B2 Cloud</button><button class="btn-secondary" onclick="exportVaultBackup()"><i class="fas fa-download"></i> Backup</button></div>
        
        <div id="fileGrid" class="file-grid"></div>
    </div>
    <div id="progressContainer" style="display:none; margin-top:20px;"><div style="height:6px; background:#2d2a55; border-radius:6px;"><div id="progressFill" style="width:0%; height:100%; background:linear-gradient(90deg,#a78bfa,#6d28d9); transition:width 0.3s;"></div></div><div id="progressText" style="font-size:12px; margin-top:6px;"></div></div>
</div>

<div id="createModal" class="modal"><div class="modal-content"><div class="modal-header" style="display:flex; justify-content:space-between;"><h3>Create Vault</h3><button onclick="closeModal('createModal')" style="background:none; border:none; color:white; font-size:24px;">×</button></div><input type="password" id="newPassword" class="search-input" placeholder="Master password (min 8)"><input type="password" id="confirmPassword" class="search-input" placeholder="Confirm"><button class="btn-primary" style="margin-top:20px;" onclick="createVault()">Initialize</button></div></div>
<div id="cloudModal" class="modal"><div class="modal-content"><h3><i class="fas fa-cloud"></i> Backblaze B2 Setup</h3><input type="text" id="b2Endpoint" class="search-input" placeholder="Endpoint (s3.us-east-005.backblazeb2.com)" value="s3.us-east-005.backblazeb2.com"><input type="text" id="b2Bucket" class="search-input" placeholder="Bucket name" value="ironvault"><input type="text" id="b2KeyId" class="search-input" placeholder="Key ID"><input type="password" id="b2AppKey" class="search-input" placeholder="Application Key"><button class="btn-primary" onclick="saveCloudConfig()">Save & Test Connection</button><button class="btn-secondary" style="margin-top:10px;" onclick="syncToCloud()"><i class="fas fa-sync"></i> Sync local to Cloud</button><button class="btn-secondary" onclick="closeModal('cloudModal')">Close</button></div></div>
<div id="previewModal" class="modal"><div class="modal-content" style="max-width:700px;"><div class="modal-header" style="display:flex; justify-content:space-between;"><h3 id="previewTitle">Preview</h3><button onclick="closeModal('previewModal')" style="background:none; border:none; color:white; font-size:24px;">×</button></div><div id="previewContent"></div></div></div>

<script>
    let masterKey = null, files = [], searchFilter = '', sortMode = 'date';
    let b2Config = { endpoint: '', bucket: '', keyId: '', appKey: '', client: null };
    
    // Crypto (same as before)
    async function deriveKey(pw, salt) { const enc = new TextEncoder(); const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']); return await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 210000, hash: 'SHA-256' }, km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']); }
    async function encryptData(data, key) { const iv = crypto.getRandomValues(new Uint8Array(12)); const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data); return { iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) }; }
    async function decryptData(enc, key) { return await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(enc.iv) }, key, new Uint8Array(enc.data)); }
    
    // IndexedDB
    function openDB() { return new Promise((res,rej)=>{ const req=indexedDB.open('IronVaultDB',2); req.onerror=()=>rej(req.error); req.onsuccess=()=>res(req.result); req.onupgradeneeded=(e)=>{ if(!e.target.result.objectStoreNames.contains('files')) e.target.result.createObjectStore('files',{keyPath:'id'}); }; }); }
    async function saveFile(fd) { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('files','readwrite'); tx.objectStore('files').put(fd); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
    async function loadAllFiles() { const db=await openDB(); return new Promise((res,rej)=>{ const req=db.transaction('files').objectStore('files').getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
    async function deleteFileFromDB(id) { const db=await openDB(); return new Promise((res,rej)=>{ const req=db.transaction('files','readwrite').objectStore('files').delete(id); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error); }); }
    
    // Vault ops
    async function createVault() { const pwd=document.getElementById('newPassword').value, conf=document.getElementById('confirmPassword').value; if(pwd.length<8) return showToast('Password 8+ chars','error'); if(pwd!==conf) return showToast('Mismatch','error'); const salt=crypto.getRandomValues(new Uint8Array(16)); const key=await deriveKey(pwd,salt); const meta={salt:Array.from(salt),created:Date.now()}; const encrypted=await encryptData(new TextEncoder().encode(JSON.stringify(meta)),key); localStorage.setItem('vault_meta',JSON.stringify({iv:encrypted.iv,data:encrypted.data})); localStorage.setItem('vault_salt',JSON.stringify(Array.from(salt))); closeModal('createModal'); document.getElementById('passwordInput').value=pwd; showToast('Vault created! Unlock.','success'); }
    async function unlock() { const pwd=document.getElementById('passwordInput').value; const saltRaw=localStorage.getItem('vault_salt'), metaRaw=localStorage.getItem('vault_meta'); if(!saltRaw||!metaRaw) return showToast('No vault','error'); try{ const salt=new Uint8Array(JSON.parse(saltRaw)); const key=await deriveKey(pwd,salt); const meta=JSON.parse(metaRaw); await decryptData({iv:meta.iv,data:meta.data},key); masterKey=key; files=await loadAllFiles(); document.getElementById('loginSection').style.display='none'; document.getElementById('vaultSection').style.display='block'; document.getElementById('statusBadge').innerHTML='<i class="fas fa-lock-open"></i> Unlocked'; document.getElementById('statusBadge').className='status-badge unlocked'; renderFiles(); updateStats(); loadCloudConfig(); showToast('Vault opened','success'); }catch(e){ showToast('Wrong password','error'); } }
    async function handleFileUpload(fileList){ if(!masterKey) return; for(const f of fileList) await uploadSingle(f); renderFiles(); updateStats(); }
    async function uploadSingle(file){ showProgress(true,`Encrypting ${file.name}`); try{ const buf=await file.arrayBuffer(); const encrypted=await encryptData(buf,masterKey); const fileData={id:crypto.randomUUID(),name:file.name,type:file.type,size:file.size,encryptedData:encrypted,uploadedAt:Date.now()}; await saveFile(fileData); files.push(fileData); showToast(`✓ ${file.name} uploaded`,'success'); if(b2Config.client) await uploadToCloud(fileData); }catch(e){ showToast(`✗ ${file.name} failed`,'error'); }finally{ showProgress(false); } }
    async function downloadFile(file){ showProgress(true,`Decrypting ${file.name}`); try{ const dec=await decryptData(file.encryptedData,masterKey); const blob=new Blob([dec],{type:file.type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file.name; a.click(); URL.revokeObjectURL(a.href); showToast(`Downloaded`,'success'); }catch(e){ showToast('Decrypt error','error'); }finally{ showProgress(false); } }
    async function deleteFile(file){ if(!confirm(`Delete ${file.name}?`)) return; showProgress(true); try{ await deleteFileFromDB(file.id); files=files.filter(f=>f.id!==file.id); if(b2Config.client) await deleteFromCloud(file.id); renderFiles(); updateStats(); showToast('Deleted','success'); }catch(e){ showToast('Delete failed','error'); }finally{ showProgress(false); } }
    async function previewFile(file){ if(file.type.startsWith('image/')||file.type.startsWith('video/')){ try{ const dec=await decryptData(file.encryptedData,masterKey); const url=URL.createObjectURL(new Blob([dec],{type:file.type})); document.getElementById('previewTitle').innerText=file.name; document.getElementById('previewContent').innerHTML=file.type.startsWith('image/')?`<img src="${url}" style="max-width:100%; border-radius:24px;">`:`<video controls style="width:100%" src="${url}"></video>`; document.getElementById('previewModal').classList.add('show'); }catch(e){ showToast('Preview error','error'); } }else showToast('Preview only images/video','info'); }
    function renderFiles(){ let filtered=files.filter(f=>f.name.toLowerCase().includes(searchFilter.toLowerCase())); if(sortMode==='name') filtered.sort((a,b)=>a.name.localeCompare(b.name)); else if(sortMode==='size') filtered.sort((a,b)=>a.size-b.size); else filtered.sort((a,b)=>b.uploadedAt-a.uploadedAt); const grid=document.getElementById('fileGrid'); if(!filtered.length){ grid.innerHTML='<div class="empty-state" style="grid-column:1/-1; text-align:center;"><i class="fas fa-cloud-moon"></i> No files — upload securely</div>'; return; } grid.innerHTML=filtered.map(f=>`<div class="file-card"><div style="font-size:48px;">${getIcon(f.name)}</div><div class="stat-value" style="font-size:1rem;">${escapeHtml(f.name).substring(0,35)}</div><div style="font-size:12px; color:var(--text-secondary);">${formatBytes(f.size)}</div><div style="display:flex; gap:10px; margin-top:12px;"><button class="btn-secondary" style="padding:6px 12px;" onclick='previewFile(${JSON.stringify(f)})'><i class="fas fa-eye"></i></button><button class="btn-secondary" style="padding:6px 12px;" onclick='downloadFile(${JSON.stringify(f)})'><i class="fas fa-download"></i></button><button class="btn-secondary" style="padding:6px 12px;" onclick='deleteFile(${JSON.stringify(f)})'><i class="fas fa-trash"></i></button></div></div>`).join(''); }
    function updateStats(){ document.getElementById('totalFiles').innerText=files.length; const total=files.reduce((s,f)=>s+(f.size||0),0); document.getElementById('totalSize').innerText=formatBytes(total); }
    function getIcon(n){ const e=n.split('.').pop()?.toLowerCase(); if(['jpg','png','gif'].includes(e)) return '🖼️'; if(['mp4','mov'].includes(e)) return '🎬'; if(['mp3','wav'].includes(e)) return '🎵'; return '📄'; }
    function formatBytes(b){ if(b===0) return '0 B'; const k=1024,i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+['B','KB','MB','GB'][i]; }
    function escapeHtml(s){ return s.replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }
    function showToast(msg,type){ const t=document.createElement('div'); t.className=`toast`; t.style.borderLeftColor=type==='success'?'#10b981':type==='error'?'#ef4444':'#3b82f6'; t.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-triangle':'info-circle'}"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    function showProgress(show,text=''){ const c=document.getElementById('progressContainer'),fill=document.getElementById('progressFill'),txt=document.getElementById('progressText'); if(show){ c.style.display='block'; txt.innerText=text; fill.style.width='70%'; setTimeout(()=>fill.style.width='100%',200); }else{ c.style.display='none'; fill.style.width='0%'; } }
    function closeModal(id){ document.getElementById(id).classList.remove('show'); }
    function showCreateModal(){ document.getElementById('createModal').classList.add('show'); }
    function showCloudSettings(){ document.getElementById('cloudModal').classList.add('show'); loadCloudConfigToInputs(); }
    function sortFiles(){ sortMode=document.getElementById('sortSelect').value; renderFiles(); }
    function filterFiles(){ searchFilter=document.getElementById('searchInput').value; renderFiles(); }
    function toggleTheme(){ document.body.classList.toggle('light'); }
    
    // Backblaze B2 S3 Integration
    async function initB2Client(){ if(!b2Config.keyId||!b2Config.appKey||!b2Config.endpoint) return null; try{ const { S3Client } = window['@aws-sdk/client-s3']; const client = new S3Client({ region: 'us-east-005', endpoint: `https://${b2Config.endpoint}`, credentials: { accessKeyId: b2Config.keyId, secretAccessKey: b2Config.appKey }, forcePathStyle: true }); return client; }catch(e){ console.error(e); return null; } }
    function saveCloudConfig(){ b2Config.endpoint=document.getElementById('b2Endpoint').value; b2Config.bucket=document.getElementById('b2Bucket').value; b2Config.keyId=document.getElementById('b2KeyId').value; b2Config.appKey=document.getElementById('b2AppKey').value; localStorage.setItem('b2_config',JSON.stringify({endpoint:b2Config.endpoint,bucket:b2Config.bucket,keyId:b2Config.keyId})); // appKey not stored in plaintext in localStorage but in memory only for session (security best practice) but user can re-enter. For demo we store temporarily. Actually we keep in memory. showToast('Cloud config saved (app key in memory)','success'); (async()=>{ const client=await initB2Client(); if(client){ b2Config.client=client; document.getElementById('cloudStatus').innerHTML='☁️ B2 Ready'; showToast('Backblaze B2 connected!','success'); }else{ showToast('Connection failed check keys','error'); } })(); closeModal('cloudModal'); }
    function loadCloudConfig(){ const saved=localStorage.getItem('b2_config'); if(saved){ const c=JSON.parse(saved); b2Config.endpoint=c.endpoint; b2Config.bucket=c.bucket; b2Config.keyId=c.keyId; document.getElementById('cloudStatus').innerHTML='☁️ Configured'; } }
    function loadCloudConfigToInputs(){ const saved=localStorage.getItem('b2_config'); if(saved){ const c=JSON.parse(saved); document.getElementById('b2Endpoint').value=c.endpoint||''; document.getElementById('b2Bucket').value=c.bucket||''; document.getElementById('b2KeyId').value=c.keyId||''; } }
    async function uploadToCloud(fileData){ if(!b2Config.client) return; const { PutObjectCommand } = window['@aws-sdk/client-s3']; try{ const encryptedBytes=new Uint8Array(fileData.encryptedData.data); await b2Config.client.send(new PutObjectCommand({ Bucket: b2Config.bucket, Key: `vault/${fileData.id}.enc`, Body: encryptedBytes, Metadata: { name: fileData.name, type: fileData.type, originalId: fileData.id } })); showToast(`Cloud backup: ${fileData.name}`,'info'); }catch(e){ console.warn('Cloud upload failed',e); } }
    async function syncToCloud(){ if(!b2Config.client||!masterKey) return showToast('Configure B2 first','error'); showProgress(true,'Syncing to Backblaze...'); for(const f of files){ await uploadToCloud(f); } showProgress(false); showToast('Sync complete','success'); }
    async function deleteFromCloud(fileId){ if(!b2Config.client) return; const { DeleteObjectCommand } = window['@aws-sdk/client-s3']; try{ await b2Config.client.send(new DeleteObjectCommand({ Bucket: b2Config.bucket, Key: `vault/${fileId}.enc` })); }catch(e){} }
    async function exportVaultBackup(){ if(!masterKey) return; const exportData=files.map(f=>({id:f.id,name:f.name,type:f.type,size:f.size,uploadedAt:f.uploadedAt,encryptedData:f.encryptedData})); const jsonStr=JSON.stringify(exportData); const encryptedBackup=await encryptData(new TextEncoder().encode(jsonStr),masterKey); const blob=new Blob([JSON.stringify(encryptedBackup)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`ironvault_backup_${Date.now()}.ivault`; a.click(); URL.revokeObjectURL(a.href); showToast('Backup exported','success'); }
    document.addEventListener('dragover',e=>e.preventDefault()); document.addEventListener('drop',async e=>{ e.preventDefault(); if(masterKey && e.dataTransfer.files.length) await handleFileUpload(e.dataTransfer.files); });
    if(localStorage.getItem('vault_salt')) document.getElementById('passwordInput').focus();
</script>
</body>
</html>
